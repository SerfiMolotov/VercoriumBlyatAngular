<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-6">
  <div class="flex justify-between items-center mb-6 border-b pb-4">
    <h2 class="text-2xl font-bold text-gray-800">➕ Nouveau Relevé</h2>
    <a routerLink="/releves" class="text-blue-600 hover:text-blue-800 underline text-sm">Retour à la liste</a>
  </div>

  <form [formGroup]="releveForm" (ngSubmit)="soumettre()" class="space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date du relevé *</label>
        <input type="date" formControlName="date_releve" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Site *</label>

        <select formControlName="site_id" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500 bg-white">

          <option value="" disabled selected>Sélectionnez un site...</option>

          @for (site of sites; track site.id) {
            <option [value]="site.id">{{ site.nom }}</option>
          }

        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Profondeur (mètres) *</label>
      <input type="number" step="0.01" formControlName="profondeur" placeholder="Ex: 12.5" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Observations</label>
      <textarea formControlName="observations" rows="3" placeholder="Tout est normal..." class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
    </div>

    <div class="flex items-center mt-2 p-3 bg-red-50 border border-red-100 rounded-md">
      <input type="checkbox" id="anomalies" formControlName="anomalies" class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
      <label for="anomalies" class="ml-2 block text-sm text-red-800 font-bold">Signaler une anomalie critique sur ce relevé</label>
    </div>

    <div class="pt-4 flex justify-end gap-3">
      <a routerLink="/releves" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">Annuler</a>

      <button type="submit" [disabled]="releveForm.invalid || enCoursDeSoumission"
              class="bg-blue-600 text-white px-6 py-2 rounded-md font-bold hover:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed transition shadow-sm">
        {{ enCoursDeSoumission ? 'Enregistrement...' : 'Enregistrer le relevé' }}
      </button>
    </div>

  </form>
</div>
