<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-6">
  <div class="flex justify-between items-center mb-6 border-b pb-4">
    <h2 class="text-2xl font-bold text-gray-800">Modifier le Site #{{ siteId }}</h2>
    <a routerLink="/sites" class="text-blue-600 hover:text-blue-800 underline text-sm">Retour aux sites</a>
  </div>

  @if (chargement) {
    <div class="text-center py-10 text-gray-500">
      Chargement des informations du site...
    </div>
  } @else {
    <form [formGroup]="siteForm" (ngSubmit)="soumettre()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom du Site *</label>
        <input type="text" formControlName="nom" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ville *</label>
          <input type="text" formControlName="ville" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Code Postal *</label>
          <input type="text" formControlName="code_postal" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label>
        <input type="text" formControlName="adresse" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type d'infrastructure *</label>
        <select formControlName="type" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
          <option value="extraction">Extraction</option>
          <option value="traitement">Traitement</option>
          <option value="stockage">Stockage</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>

      <div class="pt-4 flex justify-end gap-3">
        <a routerLink="/sites" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">Annuler</a>

        <button type="submit" [disabled]="siteForm.invalid || enCoursDeSoumission"
                class="bg-blue-600 text-white px-6 py-2 rounded-md font-bold hover:bg-blue-700 disabled:bg-blue-300 transition shadow-sm">
          {{ enCoursDeSoumission ? 'Enregistrement...' : 'Sauvegarder les modifications' }}
        </button>
      </div>
    </form>
  }
</div>
